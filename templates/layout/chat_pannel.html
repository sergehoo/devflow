<!-- CHAT PANEL GLOBAL -->
<div
  id="chatPanel"
  class="fixed right-6 bottom-6 z-[120] w-[380px] max-w-[calc(100vw-24px)] rounded-[26px] border border-[var(--border)] bg-[var(--bg2)] shadow-[0_24px_80px_rgba(15,23,42,0.28)] backdrop-blur-xl transition-all duration-300"
  style="display:none;"
>
  <div class="overflow-hidden rounded-[26px]">
    <!-- Header -->
    <div class="flex items-center justify-between border-b border-[var(--border)] px-4 py-4 bg-[linear-gradient(135deg,rgba(124,111,247,0.10)_0%,rgba(14,165,201,0.06)_45%,transparent_100%)]">
      <div class="flex items-center gap-3 min-w-0">
        <div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-[linear-gradient(135deg,var(--accent),var(--accent2))] text-white shadow-[0_10px_24px_rgba(124,111,247,0.28)]">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.9" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-4l-4 4v-4z"/>
          </svg>
        </div>

        <div class="min-w-0">
          <div class="truncate text-sm font-semibold text-[var(--text1)]">Messagerie DevFlow</div>
          <div class="flex items-center gap-2 text-[11px] text-[var(--green)]">
            <span class="inline-flex h-2 w-2 rounded-full bg-[var(--green)] animate-pulse"></span>
            En ligne
          </div>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <button
          type="button"
          onclick="minimizeChatPanel()"
          class="inline-flex h-9 w-9 items-center justify-center rounded-xl border border-[var(--border)] bg-[var(--bg3)] text-[var(--text2)] transition hover:text-[var(--text1)]"
          title="Réduire"
        >
          ─
        </button>
        <button
          type="button"
          onclick="closeChatPanel()"
          class="inline-flex h-9 w-9 items-center justify-center rounded-xl border border-[var(--border)] bg-[var(--bg3)] text-[var(--text2)] transition hover:text-[var(--text1)]"
          title="Fermer"
        >
          ✕
        </button>
      </div>
    </div>

    <!-- Body -->
    <div id="chatPanelBody" class="grid grid-cols-[110px_1fr] h-[560px] max-h-[70vh]">
      <!-- Sidebar channels -->
      <aside class="border-r border-[var(--border)] bg-[var(--bg3)]/70">
        <div class="p-3 border-b border-[var(--border)]">
          <div class="text-[11px] font-semibold uppercase tracking-[0.14em] text-[var(--text3)]">
            Channels
          </div>
        </div>

        <div id="chatChannelsList" class="space-y-1 p-2 overflow-y-auto h-[calc(100%-49px)]">
          <div class="rounded-2xl bg-[var(--bg2)] px-3 py-3 text-xs text-[var(--text3)]">
            Chargement…
          </div>
        </div>
      </aside>

      <!-- Conversation -->
      <section class="flex flex-col min-w-0">
        <!-- active channel head -->
        <div class="flex items-center justify-between gap-3 border-b border-[var(--border)] px-4 py-3">
          <div class="min-w-0">
            <div id="chatActiveChannelName" class="truncate text-sm font-semibold text-[var(--text1)]">
              Sélectionnez un canal
            </div>
            <div id="chatActiveChannelMeta" class="text-[11px] text-[var(--text3)]">
              —
            </div>
          </div>
          <a
            id="chatOpenFullPage"
            href="#"
            class="inline-flex items-center rounded-xl border border-[var(--border)] bg-[var(--bg3)] px-3 py-2 text-xs font-semibold text-[var(--text2)] transition hover:text-[var(--text1)]"
          >
            Ouvrir
          </a>
        </div>

        <!-- messages -->
        <div id="chatMessages" class="flex-1 space-y-3 overflow-y-auto px-4 py-4 bg-[var(--bg2)]">
          <div class="rounded-2xl border border-dashed border-[var(--border)] bg-[var(--bg3)] px-4 py-8 text-center text-sm text-[var(--text3)]">
            Choisissez un canal pour commencer à discuter.
          </div>
        </div>

        <!-- input -->
        <div class="border-t border-[var(--border)] px-4 py-3 bg-[var(--bg2)]">
          <form id="chatMessageForm" class="flex items-end gap-2">
            {% csrf_token %}
            <textarea
              id="chatMessageInput"
              rows="1"
              placeholder="Écrire un message…"
              class="min-h-[46px] max-h-[120px] flex-1 resize-none rounded-2xl border border-[var(--border)] bg-[var(--bg3)] px-4 py-3 text-sm text-[var(--text1)] outline-none transition focus:border-[var(--accent)]"
            ></textarea>

            <button
              type="submit"
              class="inline-flex h-[46px] w-[46px] shrink-0 items-center justify-center rounded-2xl bg-[var(--accent)] text-white shadow-[0_10px_24px_rgba(124,111,247,0.28)] transition hover:-translate-y-0.5"
              title="Envoyer"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M22 2L11 13"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M22 2L15 22l-4-9-9-4 20-7z"/>
              </svg>
            </button>
          </form>
        </div>
      </section>
    </div>
  </div>
</div>

<!-- Floating button -->
<button
  id="chatFloatingButton"
  type="button"
  onclick="openChatPanel()"
  class="fixed right-6 bottom-8 z-[119] inline-flex h-16 w-16 items-center justify-center rounded-full bg-[linear-gradient(135deg,var(--accent),var(--accent2))] text-white shadow-[0_18px_40px_rgba(124,111,247,0.35)] transition hover:-translate-y-1"
  title="Ouvrir le chat"
>
  <div class="relative">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.9" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-4l-4 4v-4z"/>
    </svg>
    <span
      id="chatUnreadBadge"
      class="absolute -right-2 -top-2 hidden min-w-[20px] rounded-full bg-[var(--red)] px-1.5 py-0.5 text-center text-[10px] font-bold text-white"
    >
      0
    </span>
  </div>
</button>


<script>
(function () {
    let currentChannelId = null;
    let chatSocket = null;
    let chatInitialized = false;

    const panel = () => document.getElementById("chatPanel");
    const floatingBtn = () => document.getElementById("chatFloatingButton");
    const messagesBox = () => document.getElementById("chatMessages");
    const channelsList = () => document.getElementById("chatChannelsList");
    const input = () => document.getElementById("chatMessageInput");
    const form = () => document.getElementById("chatMessageForm");
    const unreadBadge = () => document.getElementById("chatUnreadBadge");

    function getCsrfToken() {
        const el = document.querySelector("[name=csrfmiddlewaretoken]");
        return el ? el.value : "";
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.innerText = text || "";
        return div.innerHTML;
    }

    function renderMessage(message, mine = false) {
        return `
            <div class="flex ${mine ? "justify-end" : "justify-start"}">
                <div class="max-w-[85%]">
                    <div class="mb-1 text-[11px] ${mine ? "text-right" : ""} text-[var(--text3)]">
                        ${escapeHtml(message.author || "Utilisateur")}
                    </div>
                    <div class="rounded-2xl px-4 py-3 text-sm leading-6 ${
                        mine
                            ? "bg-[var(--accent)] text-white"
                            : "border border-[var(--border)] bg-[var(--bg3)] text-[var(--text1)]"
                    }">
                        ${escapeHtml(message.body)}
                    </div>
                    <div class="mt-1 text-[10px] ${mine ? "text-right" : ""} text-[var(--text3)]">
                        ${escapeHtml(message.created_at || "")}
                    </div>
                </div>
            </div>
        `;
    }

    function scrollMessagesBottom() {
        const box = messagesBox();
        if (box) box.scrollTop = box.scrollHeight;
    }

    async function loadChannels() {
        try {
            const response = await fetch("/channels/panel/", {
                headers: { "X-Requested-With": "XMLHttpRequest" }
            });
            const data = await response.json();

            if (!data.success) {
                channelsList().innerHTML = `
                    <div class="rounded-2xl bg-[var(--bg2)] px-3 py-3 text-xs text-[var(--red)]">
                        Impossible de charger les canaux.
                    </div>
                `;
                return;
            }

            const items = data.channels || [];
            if (!items.length) {
                channelsList().innerHTML = `
                    <div class="rounded-2xl bg-[var(--bg2)] px-3 py-3 text-xs text-[var(--text3)]">
                        Aucun canal disponible.
                    </div>
                `;
                return;
            }

            channelsList().innerHTML = items.map(channel => `
                <button
                    type="button"
                    data-channel-id="${channel.id}"
                    class="chat-channel-btn flex w-full items-center justify-between rounded-2xl px-3 py-3 text-left transition hover:bg-[var(--bg2)]"
                >
                    <div class="min-w-0">
                        <div class="truncate text-sm font-semibold text-[var(--text1)]">${escapeHtml(channel.name)}</div>
                        <div class="truncate text-[11px] text-[var(--text3)]">
                            ${channel.is_private ? "Privé" : "Public"}
                        </div>
                    </div>
                    ${channel.unread_count ? `
                        <span class="ml-2 inline-flex min-w-[20px] items-center justify-center rounded-full bg-[var(--red)] px-1.5 py-0.5 text-[10px] font-bold text-white">
                            ${channel.unread_count}
                        </span>
                    ` : ""}
                </button>
            `).join("");

            channelsList().querySelectorAll(".chat-channel-btn").forEach(btn => {
                btn.addEventListener("click", () => openChannel(btn.dataset.channelId));
            });

            if (!currentChannelId && items[0]) {
                openChannel(items[0].id);
            }

            updateGlobalUnread(items);
        } catch (error) {
            console.error(error);
        }
    }

    function updateGlobalUnread(items) {
        const total = (items || []).reduce((acc, c) => acc + (c.unread_count || 0), 0);
        if (total > 0) {
            unreadBadge().textContent = total;
            unreadBadge().classList.remove("hidden");
        } else {
            unreadBadge().classList.add("hidden");
        }
    }

    async function openChannel(channelId) {
        currentChannelId = channelId;

        document.querySelectorAll(".chat-channel-btn").forEach(btn => {
            if (btn.dataset.channelId === String(channelId)) {
                btn.classList.add("bg-[var(--accent-bg)]");
            } else {
                btn.classList.remove("bg-[var(--accent-bg)]");
            }
        });

        try {
            const response = await fetch(`/channels/${channelId}/panel/`, {
                headers: { "X-Requested-With": "XMLHttpRequest" }
            });
            const data = await response.json();

            if (!data.success) return;

            document.getElementById("chatActiveChannelName").textContent = data.channel.name;
            document.getElementById("chatActiveChannelMeta").textContent =
                data.channel.is_private ? "Canal privé" : "Canal workspace";
            document.getElementById("chatOpenFullPage").href = `/channels/${channelId}/`;

            const msgs = data.messages || [];
            messagesBox().innerHTML = msgs.length
                ? msgs.map(m => renderMessage(m, m.is_mine)).join("")
                : `
                    <div class="rounded-2xl border border-dashed border-[var(--border)] bg-[var(--bg3)] px-4 py-8 text-center text-sm text-[var(--text3)]">
                        Aucun message pour le moment.
                    </div>
                `;

            scrollMessagesBottom();
            connectChannelSocket(channelId);
        } catch (error) {
            console.error(error);
        }
    }

    function connectChannelSocket(channelId) {
        if (chatSocket) {
            chatSocket.close();
            chatSocket = null;
        }

        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        chatSocket = new WebSocket(`${protocol}://${window.location.host}/ws/channels/${channelId}/`);

        chatSocket.onmessage = function (e) {
            const data = JSON.parse(e.data || "{}");
            if (data.type === "chat_message") {
                messagesBox().insertAdjacentHTML("beforeend", renderMessage(data.message, data.message.is_mine));
                scrollMessagesBottom();
            }
        };

        chatSocket.onclose = function () {
            console.warn("Chat websocket fermé");
        };

        chatSocket.onerror = function (e) {
            console.error("Erreur websocket chat", e);
        };
    }

    async function sendMessage() {
        const body = input().value.trim();
        if (!body || !currentChannelId) return;

        if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
            chatSocket.send(JSON.stringify({
                body: body
            }));
            input().value = "";
            input().style.height = "46px";
            return;
        }

        try {
            const response = await fetch(`/channels/${currentChannelId}/messages/send/`, {
                method: "POST",
                headers: {
                    "X-CSRFToken": getCsrfToken(),
                    "X-Requested-With": "XMLHttpRequest",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ body })
            });

            const data = await response.json();
            if (data.success) {
                messagesBox().insertAdjacentHTML("beforeend", renderMessage(data.message, true));
                input().value = "";
                input().style.height = "46px";
                scrollMessagesBottom();
            }
        } catch (error) {
            console.error(error);
        }
    }

    window.openChatPanel = async function () {
        panel().style.display = "block";
        floatingBtn().style.display = "none";

        if (!chatInitialized) {
            chatInitialized = true;
            await loadChannels();
        }
    };

    window.closeChatPanel = function () {
        panel().style.display = "none";
        floatingBtn().style.display = "inline-flex";
    };

    window.minimizeChatPanel = function () {
        closeChatPanel();
    };

    document.addEventListener("DOMContentLoaded", function () {
        if (form()) {
            form().addEventListener("submit", function (e) {
                e.preventDefault();
                sendMessage();
            });
        }

        if (input()) {
            input().addEventListener("input", function () {
                this.style.height = "auto";
                this.style.height = Math.min(this.scrollHeight, 120) + "px";
            });

            input().addEventListener("keydown", function (e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }
    });
})();
</script>
