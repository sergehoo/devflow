{% load humanize %}
<div x-show="docModalOpen"
     x-cloak
     x-transition.opacity
     class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/75 p-3 sm:p-4"
     @keydown.escape.window="closeDocumentModal()">
    <div class="absolute inset-0" @click="closeDocumentModal()"></div>

    <div class="relative flex h-[94vh] w-full max-w-7xl flex-col overflow-hidden rounded-[28px] border border-white/10 bg-[var(--bg2)] shadow-2xl">
        <!-- HEADER -->
        <div class="flex items-center justify-between gap-4 border-b border-[var(--border)] px-4 py-4 sm:px-5">
            <div class="min-w-0">
                <div class="truncate text-base font-semibold text-[var(--text1)]" x-text="docViewer.name || 'Document'"></div>
                <div class="mt-1 flex flex-wrap items-center gap-2 text-xs text-[var(--text3)]">
                    <span class="inline-flex items-center rounded-full bg-[var(--bg3)] px-2.5 py-1 font-semibold"
                          x-text="docViewer.ext ? docViewer.ext.toUpperCase() : 'FICHIER'"></span>

                    <template x-if="docViewer.mode === 'image'">
                        <span class="inline-flex items-center rounded-full bg-[var(--cyan-bg)] px-2.5 py-1 font-semibold text-[var(--cyan)]">
                            Image
                        </span>
                    </template>

                    <template x-if="docViewer.mode === 'pdf'">
                        <span class="inline-flex items-center rounded-full bg-[var(--red-bg)] px-2.5 py-1 font-semibold text-[var(--red)]">
                            PDF
                        </span>
                    </template>

                    <template x-if="docViewer.mode === 'text'">
                        <span class="inline-flex items-center rounded-full bg-[var(--amber-bg)] px-2.5 py-1 font-semibold text-[var(--amber)]">
                            Texte
                        </span>
                    </template>

                    <template x-if="docViewer.mode === 'office'">
                        <span class="inline-flex items-center rounded-full bg-[var(--accent-bg)] px-2.5 py-1 font-semibold text-[var(--accent)]">
                            Office Viewer
                        </span>
                    </template>

                    <template x-if="docViewer.isLocal">
                        <span class="inline-flex items-center rounded-full bg-[var(--bg3)] px-2.5 py-1 font-semibold text-[var(--text2)]">
                            URL locale / privée
                        </span>
                    </template>
                </div>
            </div>

            <div class="flex shrink-0 items-center gap-2">
                <a :href="docViewer.url"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="inline-flex items-center gap-2 rounded-xl border border-[var(--border)] bg-[var(--bg3)] px-3 py-2 text-xs font-semibold text-[var(--text2)] transition hover:bg-[var(--bg4)] hover:text-[var(--text1)]">
                    Ouvrir
                </a>

                <button type="button"
                        @click="closeDocumentModal()"
                        class="inline-flex items-center justify-center rounded-xl border border-[var(--border)] bg-[var(--bg3)] px-3 py-2 text-xs font-semibold text-[var(--text2)] transition hover:bg-[var(--bg4)] hover:text-[var(--text1)]">
                    Fermer
                </button>
            </div>
        </div>

        <!-- BODY -->
        <div class="min-h-0 flex-1 bg-[var(--bg3)]">
            <!-- IMAGE -->
            <template x-if="docViewer.mode === 'image'">
                <div class="flex h-full items-center justify-center p-4 sm:p-6">
                    <img :src="docViewer.url"
                         :alt="docViewer.name"
                         class="max-h-full max-w-full rounded-2xl object-contain shadow-soft">
                </div>
            </template>

            <!-- PDF -->
            <template x-if="docViewer.mode === 'pdf'">
                <iframe :src="docViewer.url"
                        class="h-full w-full bg-white"
                        frameborder="0">
                </iframe>
            </template>

            <!-- TEXTE / CSV / HTML -->
            <template x-if="docViewer.mode === 'text'">
                <iframe :src="docViewer.url"
                        class="h-full w-full bg-white"
                        frameborder="0">
                </iframe>
            </template>

            <!-- OFFICE si URL publique -->
            <template x-if="docViewer.mode === 'office' && !docViewer.isLocal && docViewer.officeUrl">
                <iframe :src="docViewer.officeUrl"
                        class="h-full w-full bg-white"
                        frameborder="0">
                </iframe>
            </template>

            <!-- FALLBACK URL locale/privée -->
            <template x-if="docViewer.mode === 'office' && docViewer.isLocal">
                <div class="flex h-full flex-col items-center justify-center p-8 text-center">
                    <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-[var(--bg2)] text-[var(--accent)] shadow-soft">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 7V5a2 2 0 012-2h6l4 4v12a2 2 0 01-2 2H9a2 2 0 01-2-2V7z"/>
                        </svg>
                    </div>

                    <div class="mt-5 text-lg font-semibold text-[var(--text1)]">
                        Prévisualisation Office indisponible
                    </div>

                    <div class="mt-2 max-w-xl text-sm leading-6 text-[var(--text3)]">
                        Les fichiers Word, Excel et PowerPoint ne peuvent pas être affichés via le viewer Office
                        lorsque l’URL du document est locale ou privée, par exemple <strong>127.0.0.1</strong>,
                        <strong>localhost</strong>, ou une URL interne non accessible publiquement.
                    </div>

                    <div class="mt-6 flex flex-wrap justify-center gap-3">
                        <a :href="docViewer.url"
                           target="_blank"
                           rel="noopener noreferrer"
                           class="inline-flex items-center gap-2 rounded-2xl bg-[var(--accent)] px-4 py-2.5 text-sm font-semibold text-white transition hover:opacity-95">
                            Ouvrir le document
                        </a>
                    </div>
                </div>
            </template>

            <!-- FALLBACK général -->
            <template x-if="docViewer.mode === 'download'">
                <div class="flex h-full flex-col items-center justify-center p-8 text-center">
                    <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-[var(--bg2)] text-[var(--text3)] shadow-soft">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 7V5a2 2 0 012-2h6l4 4v12a2 2 0 01-2 2H9a2 2 0 01-2-2V7z"/>
                        </svg>
                    </div>

                    <div class="mt-5 text-lg font-semibold text-[var(--text1)]">
                        Prévisualisation non disponible
                    </div>

                    <div class="mt-2 max-w-md text-sm text-[var(--text3)]">
                        Ce type de fichier ne peut pas être affiché directement dans la visionneuse intégrée.
                    </div>

                    <a :href="docViewer.url"
                       target="_blank"
                       rel="noopener noreferrer"
                       class="mt-5 inline-flex items-center gap-2 rounded-2xl bg-[var(--accent)] px-4 py-2.5 text-sm font-semibold text-white transition hover:opacity-95">
                        Télécharger / ouvrir le document
                    </a>
                </div>
            </template>
        </div>
    </div>
</div>
