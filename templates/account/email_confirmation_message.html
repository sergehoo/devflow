<!-- email_confirmation_message.html -->
<!doctype html>
<html lang="fr">
<body style="margin:0;padding:0;background:#f8fafc;font-family:Arial,sans-serif;color:#0f172a;">
  <div style="max-width:620px;margin:0 auto;padding:32px;">
    <div style="background:#ffffff;border:1px solid #e2e8f0;border-radius:20px;padding:32px;">
      <h1 style="margin:0 0 12px;font-size:24px;">Confirmez votre adresse e-mail</h1>

      <p style="font-size:15px;line-height:1.6;color:#475569;">
        Bienvenue sur DevFlow. Cliquez sur le bouton ci-dessous pour activer votre compte.
      </p>

      <p style="margin:28px 0;">
        <a href="{{ activate_url }}"
           style="display:inline-block;background:#4f46e5;color:#ffffff;text-decoration:none;padding:14px 22px;border-radius:14px;font-weight:bold;">
          Confirmer mon adresse
        </a>
      </p>

      <p style="font-size:13px;line-height:1.6;color:#64748b;">
        Si le bouton ne fonctionne pas, copiez ce lien dans votre navigateur :<br>
        <span style="word-break:break-all;">{{ activate_url }}</span>
      </p>

      <p style="font-size:13px;color:#94a3b8;">
        Si vous n’êtes pas à l’origine de cette demande, ignorez cet e-mail.
      </p>
    </div>
  </div>
</body>
</html>
